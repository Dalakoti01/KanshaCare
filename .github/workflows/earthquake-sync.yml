name: Earthquake Hourly Scheduler

on:
  workflow_dispatch:

  schedule:
    - cron: "* * * * *"

jobs:
  sync-earthquakes:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Earthquake Hourly API
        run: |
          echo "Calling earthquake API..."
          curl --max-time 60 -X GET https://kanshacare.onrender.com/api/earthquake/hourlyUpdate
          echo "API call completed"